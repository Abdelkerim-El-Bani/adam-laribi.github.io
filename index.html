<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adam Laribi Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b0f;
            --text: #ffffff;
            --muted: #a0a0a0;
            --accent: #4bff91;
            --accent2: #2ecc71;
            --glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Layout ── */
        .page {
            display: grid;
            grid-template-columns: 1fr 220px;
            min-height: 100vh;
            gap: 0;
        }

        /* ── Left: content ── */
        .content {
            padding: 60px 60px 60px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
            position: relative;
        }

        .tag {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.2s;
        }

        .profile-block {
            display: flex;
            align-items: center;
            gap: 28px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.4s;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px rgba(75,255,145,0.25);
            flex-shrink: 0;
        }

        .profile-img-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2a1a, #0d1f0d);
            border: 3px solid var(--accent);
            box-shadow: 0 0 30px rgba(75,255,145,0.25);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        h1 {
            font-size: clamp(36px, 5vw, 64px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -2px;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            margin-top: 6px;
        }

        .bio-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.6s;
        }

        .bio-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s, transform 0.3s;
        }

        .bio-card:hover {
            border-color: rgba(75,255,145,0.3);
            transform: translateX(6px);
        }

        .bio-card-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .bio-card p {
            font-size: 15px;
            color: #ddd;
            line-height: 1.5;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            border-radius: 2px;
            opacity: 0;
            animation: fadeUp 0.6s ease forwards 0.5s;
        }

        /* ── Right: Lava Lamp ── */
        .lamp-side {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(75,255,145,0.03) 0%, transparent 100%);
            border-left: 1px solid var(--border);
            overflow: hidden;
        }

        .lamp-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(75,255,145,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── Lava Lamp (from LofiLamp) ── */
        .lava-lamp {
            height: 420px;
            width: 150px;
            position: relative;
            filter: drop-shadow(0 20px 40px rgba(80,255,120,0.25));
            animation: lampFloat 6s ease-in-out infinite;
        }

        @keyframes lampFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .lava-lamp__main {
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            z-index: 2;
            background: linear-gradient(180deg, #000 0%, #0a0f0a 100%);
        }

        .lava-lamp__main:after,
        .lava-lamp__main:before {
            background: linear-gradient(180deg, #000 0%, #0f1a0f 100%);
            content: '';
            height: 12%;
            left: 0;
            position: absolute;
            width: 100%;
        }

        .lava-lamp__main:after {
            top: 0;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .lava-lamp__main:before {
            bottom: 0;
            height: 26%;
            border-radius: 0 0 50% 50% / 0 0 35% 35%;
        }

        .lava-lamp__glass {
            background: radial-gradient(ellipse at 50% 60%, 
                rgba(0,40,20,0.95) 0%, 
                rgba(20,80,40,0.8) 25%, 
                rgba(40,150,70,0.6) 50%, 
                rgba(60,200,100,0.4) 75%, 
                rgba(80,255,120,0.15) 100%);
            border-radius: 50% / 10%;
            overflow: hidden;
            height: 70%;
            left: 0;
            position: absolute;
            top: 10%;
            width: 100%;
            z-index: 2;
            animation: glass-shimmer 8s ease-in-out infinite;
            box-shadow: inset 0 0 30px rgba(80,255,120,0.2);
        }

        @keyframes glass-shimmer {
            0%, 100% { filter: brightness(1) saturate(1); }
            50% { filter: brightness(1.05) saturate(1.1); }
        }

        .lava-lamp__glass:before {
            content: '';
            position: absolute;
            top: 10%;
            left: 20%;
            width: 20%;
            height: 60%;
            background: linear-gradient(180deg, rgba(160,255,180,0.3) 0%, rgba(160,255,180,0.1) 50%, transparent 100%);
            border-radius: 50%;
            filter: blur(10px);
        }

        .lava-lamp__glass:after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 30%;
            background: radial-gradient(ellipse at center, rgba(80,255,120,0.2) 0%, transparent 70%);
            filter: blur(20px);
        }

        .lava-lamp__base {
            height: 20%;
            width: 100%;
            position: absolute;
            bottom: 0;
            overflow: hidden;
            border-radius: 0 0 50% 50% / 0 0 35% 35%;
        }

        .lava-lamp__base:before {
            content: '';
            background: linear-gradient(180deg, #000 0%, #0a0f0a 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: absolute;
            top: -60%;
            height: 420px;
            width: 150px;
        }

        .lava-lamp__lava {
            border-radius: 50% / 10%;
            height: 100%;
            overflow: hidden;
            position: absolute;
            width: 100%;
        }

        .lava-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50% / 10%;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .page {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }

            .lamp-side {
                border-left: none;
                border-top: 1px solid var(--border);
                height: 320px;
                order: -1;
            }

            .lava-lamp {
                height: 270px;
                width: 110px;
            }

            .lava-lamp__base:before {
                height: 270px;
                width: 110px;
            }

            .content {
                padding: 36px 28px;
            }

            h1 {
                font-size: 36px;
            }

            .profile-block {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="page">
    <!-- Left: content -->
    <div class="content">
        <div class="tag">Portfolio · 2026</div>

        <div class="profile-block">
            <img src="image.png" class="profile-img" alt="Adam Laribi">
            <div>
                <h1>Adam<br><span>Laribi</span></h1>
                <p class="subtitle">Certified Babouchka Enjoyer mmmh</p>
            </div>
        </div>

        <div class="divider"></div>

        <div class="bio-cards">
            <div class="bio-card">
                <div class="bio-card-label">About</div>
                <p>Professional artist, teacher, and foot fetishist :D</p>
            </div>
            <div class="bio-card">
                <div class="bio-card-label">Hobbies</div>
                <p>Watching the grass grow. Fucking around and finding out.</p>
            </div>
        </div>
    </div>

    <!-- Right: Lava Lamp -->
    <div class="lamp-side">
        <div class="lamp-glow"></div>
        <div class="lava-lamp">
            <div class="lava-lamp__main">
                <div class="lava-lamp__glass">
                    <div class="lava-lamp__lava">
                        <canvas class="lava-canvas" id="blobCanvas"></canvas>
                    </div>
                </div>
            </div>
            <div class="lava-lamp__base"></div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('blobCanvas');
const ctx = canvas.getContext('2d');
const lampSide = document.querySelector('.lamp-side');

// Mouse position relative to the canvas
let mouse = { x: -9999, y: -9999, inside: false };

// Blob definitions: x/y are normalised 0-1 within canvas
const blobs = [
    { x: 0.27, y: 0.85, r: 22, vx: 0.3,  vy: -0.6, baseY: 0.85 },
    { x: 0.73, y: 0.15, r: 30, vx: -0.4, vy:  0.5, baseY: 0.15 },
    { x: 0.50, y: 0.55, r: 26, vx:  0.2, vy: -0.4, baseY: 0.55 },
    { x: 0.20, y: 0.30, r: 18, vx:  0.5, vy:  0.3, baseY: 0.30 },
    { x: 0.77, y: 0.70, r: 24, vx: -0.3, vy: -0.5, baseY: 0.70 },
    { x: 0.39, y: 0.20, r: 28, vx:  0.4, vy:  0.6, baseY: 0.20 },
    { x: 0.61, y: 0.40, r: 20, vx: -0.2, vy: -0.3, baseY: 0.40 },
];

function resize() {
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width  = rect.width;
    canvas.height = rect.height;
}

window.addEventListener('resize', resize);
resize();

// Track mouse over the lamp glass area
const glassEl = document.querySelector('.lava-lamp__glass');
document.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    mouse.inside = (
        mouse.x >= 0 && mouse.x <= rect.width &&
        mouse.y >= 0 && mouse.y <= rect.height
    );
});
document.addEventListener('mouseleave', () => { mouse.inside = false; });

// Metaball / goo rendering via threshold on sum-of-fields
function draw() {
    const W = canvas.width, H = canvas.height;
    if (W === 0 || H === 0) { requestAnimationFrame(draw); return; }

    // Physics update
    blobs.forEach(b => {
        // Slow natural float
        b.vy += (Math.random() - 0.5) * 0.04;
        b.vx += (Math.random() - 0.5) * 0.02;

        // Gentle buoyancy: pull toward baseY
        const dy = b.baseY * H - b.y;
        b.vy += dy * 0.0004;

        // Mouse attraction
        if (mouse.inside) {
            const dx = mouse.x - b.x;
            const dy2 = mouse.y - b.y;
            const dist = Math.sqrt(dx*dx + dy2*dy2) || 1;
            const strength = Math.min(120 / (dist * dist), 1.2);
            b.vx += (dx / dist) * strength * 0.18;
            b.vy += (dy2 / dist) * strength * 0.18;
        }

        // Damping
        b.vx *= 0.96;
        b.vy *= 0.96;

        // Clamp speed
        const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        if (spd > 3.5) { b.vx = b.vx/spd*3.5; b.vy = b.vy/spd*3.5; }

        b.x += b.vx;
        b.y += b.vy;

        // Bounce off walls (keep inside canvas)
        const margin = b.r;
        if (b.x < margin)   { b.x = margin;   b.vx = Math.abs(b.vx) * 0.6; }
        if (b.x > W-margin) { b.x = W-margin; b.vx = -Math.abs(b.vx) * 0.6; }
        if (b.y < margin)   { b.y = margin;   b.vy = Math.abs(b.vy) * 0.6; }
        if (b.y > H-margin) { b.y = H-margin; b.vy = -Math.abs(b.vy) * 0.6; }
    });

    // Render metaballs with ImageData for the goo threshold effect
    const imgData = ctx.createImageData(W, H);
    const data = imgData.data;

    // Subsample every 2 pixels for performance, then scale up
    const step = 2;
    for (let py = 0; py < H; py += step) {
        for (let px = 0; px < W; px += step) {
            let sum = 0;
            for (let i = 0; i < blobs.length; i++) {
                const b = blobs[i];
                const dx = px - b.x, dy = py - b.y;
                sum += (b.r * b.r) / (dx*dx + dy*dy + 1);
            }
            if (sum > 1.0) {
                // Soft edge: ramp alpha based on how far above threshold
                const alpha = Math.min((sum - 1.0) * 6, 1.0);
                for (let oy = 0; oy < step && py+oy < H; oy++) {
                    for (let ox = 0; ox < step && px+ox < W; ox++) {
                        const idx = ((py+oy)*W + (px+ox)) * 4;
                        data[idx]   = 75;         // R
                        data[idx+1] = 255;        // G
                        data[idx+2] = 145;        // B
                        data[idx+3] = Math.round(alpha * 230);
                    }
                }
            }
        }
    }

    ctx.putImageData(imgData, 0, 0);
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
